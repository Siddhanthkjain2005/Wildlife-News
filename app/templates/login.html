<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - Wildlife Intelligence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body class="ops-body d-flex align-items-center" style="min-height:100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="ops-card">
          <div class="ops-card-header">Admin Login</div>
          <div class="ops-card-body">
            {% if error %}
              <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            {% if info %}
              <div class="alert alert-info py-2">{{ info }}</div>
            {% endif %}
            <form method="post" action="/login">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control ops-input" name="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control ops-input" type="password" name="password" required>
              </div>
              <button class="btn btn-info w-100" type="submit">Sign in</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
