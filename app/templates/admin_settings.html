<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Settings - Wildlife Intelligence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body class="ops-body">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Admin Settings</h1>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-sm btn-outline-light">Back to Dashboard</a>
        <form method="post" action="/logout">
          <button class="btn btn-sm btn-outline-danger">Logout</button>
        </form>
      </div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <div class="kpi-card">
          <div class="kpi-label">Cache Entries</div>
          <div class="kpi-value">{{ cache_state.entries }}</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card">
          <div class="kpi-label">Cache Hits</div>
          <div class="kpi-value">{{ cache_state.hits }}</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card">
          <div class="kpi-label">Sync Running</div>
          <div class="kpi-value">{{ "Yes" if sync_state.running else "No" }}</div>
        </div>
      </div>
    </div>

    <div class="ops-card mb-3">
      <div class="ops-card-header">Runtime Configuration</div>
      <div class="ops-card-body">
        <form method="post" action="/admin/settings/update" class="row g-3">
          <div class="col-12">
            <label class="form-label">Enabled Providers</label>
            <input class="form-control ops-input" name="enabled_providers" value="{{ settings_view.enabled_providers }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Sync Interval (minutes)</label>
            <input type="number" class="form-control ops-input" name="sync_interval_minutes" value="{{ settings_view.sync_interval_minutes }}" min="1" max="180" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Cache TTL (seconds)</label>
            <input type="number" class="form-control ops-input" name="cache_ttl_seconds" value="{{ settings_view.cache_ttl_seconds }}" min="5" max="900" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Backup Interval (minutes)</label>
            <input type="number" class="form-control ops-input" name="backup_interval_minutes" value="{{ settings_view.backup_interval_minutes }}" min="10" max="1440" required>
          </div>
          <div class="col-12">
            <button class="btn btn-info" type="submit">Apply Settings</button>
          </div>
        </form>
      </div>
    </div>

    <div class="ops-card">
      <div class="ops-card-header">Operations</div>
      <div class="ops-card-body d-flex gap-2 flex-wrap">
        <form method="post" action="/admin/settings/test-telegram">
          <button class="btn btn-outline-primary btn-sm">Test Telegram</button>
        </form>
        <form method="post" action="/admin/settings/test-email">
          <button class="btn btn-outline-primary btn-sm">Test Email</button>
        </form>
        <form method="post" action="/admin/settings/cache-clear">
          <button class="btn btn-outline-warning btn-sm">Clear Cache</button>
        </form>
        <form method="post" action="/admin/settings/run-backup">
          <button class="btn btn-outline-success btn-sm">Run Backup</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
